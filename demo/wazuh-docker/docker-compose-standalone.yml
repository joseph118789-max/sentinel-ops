# Standalone Wazuh Manager — demo only, no indexer/dashboard
services:
  wazuh.manager:
    image: wazuh/wazuh-manager:4.9.0
    hostname: sentinel-demo-mgr
    restart: always
    ports:
      - "1514:1514"
      - "1515:1515"
      - "55000:55000"
    environment:
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
volumes:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
