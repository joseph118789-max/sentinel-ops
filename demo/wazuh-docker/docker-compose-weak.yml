services:
  demo-weak-01:
    image: ubuntu:22.04
    hostname: demo-weak-01
    restart: always
    privileged: true
    command: bash -c "
      apt-get update -qq &&
      apt-get install -y -qq openssh-server vim net-tools iproute2 wget curl python3 >
      /dev/null 2>&1 &&
      mkdir -p /var/run/sshd &&
      sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config &&
      sed -i 's/#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
      sed -i 's/#MaxAuthTries.*/MaxAuthTries 10/' /etc/ssh/sshd_config &&
      sed -i 's/#PermitEmptyPasswords.*/PermitEmptyPasswords yes/' /etc/ssh/sshd_config &&
      echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config &&
      echo 'PasswordAuthentication yes' >> /etc/ssh/sshd_config &&
      echo 'PermitEmptyPasswords yes' >> /etc/ssh/sshd_config &&
      echo 'PasswordAuthentication yes' >> /etc/ssh/sshd_config &&
      echo 'root:weakpass123' | chpasswd &&
      echo 'Weak SSH config applied' &&
      /usr/sbin/sshd -D
    "
    ports:
      - "2222:22"
