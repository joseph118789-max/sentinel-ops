# Wazuh Agent Deployment Playbook
# Deploys Wazuh agent to client servers

- name: Deploy Wazuh Agent to client servers
  hosts: demo_servers
  become: true
  vars:
    wazuh_manager_ip: "10.0.1.50"  # Demo Wazuh manager IP
    wazuh_agent_version: "4.9.0"
  tasks:
    - name: Add Wazuh GPG key
      ansible.builtin apt_key:
        url: https://packages.wazuh.com/key/GPG-KEY-WAZUH
        state: present

    - name: Add Wazuh repository
      ansible.builtin apt_repository:
        repo: "deb https://packages.wazuh.com/4.x/apt/ stable main"
        state: present
        filename: wazuh

    - name: Update apt cache
      ansible.builtin apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Wazuh Agent
      ansible.builtin.apt:
        name: wazuh-agent
        state: present

    - name: Configure Wazuh Agent (point to manager)
      ansible.builtin.template:
        src: templates/ossec.conf.j2
        dest: /var/ossec/etc/ossec.conf
        mode: '0640'
        owner: ossec
        group: ossec
      notify: Restart Wazuh Agent

    - name: Enable Wazuh Agent
      ansible.builtin.systemd:
        name: wazuh-agent
        enabled: yes
        state: started

    - name: Register agent with manager
      ansible.builtin.command: /var/ossec/bin/agent-auth -m {{ wazuh_manager_ip }} -p 1515
      register: agent_auth_result
      failed_when: false

    - name: Wait for agent to connect
      ansible.builtin.wait_for:
        timeout: 5

    - name: Show agent info
      ansible.builtin.debug:
        msg: |
          Wazuh Agent deployed on {{ inventory_hostname }}
          Manager: {{ wazuh_manager_ip }}
          Agent status: Run 'sudo /var/ossec/bin/agent-control -l' on manager to verify
          Agent ID: Check /var/ossec/etc/client.keys on manager

  handlers:
    - name: Restart Wazuh Agent
      ansible.builtin.systemd:
        name: wazuh-agent
        state: restarted